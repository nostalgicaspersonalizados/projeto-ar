<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nostálgicas - Experiência Mágica</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --cor-primaria: #8C52FF; }
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

        /* TELA INICIAL */
        #ui { 
            position: fixed; inset: 0; z-index: 1000; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; color: #fff; text-align: center; 
            padding: 20px;
        }

        .fundo-desfocado {
            position: absolute; inset: 0; z-index: -2; 
            background: linear-gradient(135deg, #1a1a1a 0%, #000 100%);
            /* Se tiver a imagem de fundo, descomente a linha abaixo: */
            /* background-image: url('./fundotema.png'); background-size: cover; filter: blur(8px); */
        }

        .conteudo { z-index: 1; display: flex; flex-direction: column; align-items: center; }
        .img-logo { max-width: 180px; margin-bottom: 25px; filter: drop-shadow(0 0 8px var(--cor-primaria)); }

        .instrucoes { 
            background: rgba(255, 255, 255, 0.05); padding: 20px; 
            border-radius: 15px; margin-bottom: 30px; 
            border: 1px solid rgba(140, 82, 255, 0.3);
            max-width: 260px; backdrop-filter: blur(5px);
        }

        .passo { font-size: 15px; margin: 10px 0; display: flex; align-items: center; text-align: left; }
        .numero { 
            background: var(--cor-primaria); width: 20px; height: 20px; 
            border-radius: 50%; margin-right: 12px; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 11px; flex-shrink: 0;
        }

        button { 
            padding: 16px 40px; font-size: 16px; 
            background: var(--cor-primaria); color: #fff; 
            border: none; border-radius: 30px; cursor: pointer; 
            font-weight: bold; box-shadow: 0 4px 15px rgba(140, 82, 255, 0.4);
            transition: 0.3s;
        }
        button:active { transform: scale(0.95); }

        #footer-ar { 
            position: fixed; bottom: 20px; width: 100%; 
            text-align: center; z-index: 999; display: none; 
            color: var(--cor-primaria); font-size: 10px; font-weight: bold;
            text-shadow: 0 1px 3px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div class="fundo-desfocado"></div>
        <div class="conteudo">
            <img src="./NOSTÁLGICAS.png" class="img-logo" alt="Nostálgicas">
            <div class="instrucoes">
                <div class="passo"><span class="numero">1</span> Clique em Iniciar</div>
                <div class="passo"><span class="numero">2</span> Autorize a câmera</div>
                <div class="passo"><span class="numero">3</span> Aponte para a caneca</div>
            </div>
            <button id="startButton">INICIAR AGORA</button>
        </div>
    </div>

    <div id="footer-ar">🎥 Marque @nostalgicas.personalizados</div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes; filterMinCF:0.0001; filterBeta: 0.001;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./vidiobts.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" 
                     width="1" 
                     height="1.78" 
                     position="0 0 0.05" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const video = document.querySelector("#vid");
        const ui = document.querySelector("#ui");
        const footer = document.querySelector("#footer-ar");
        const sceneEl = document.querySelector("a-scene");

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            footer.style.display = "block";
            
            // Tenta dar play e pause rápido para "acordar" o áudio no celular
            video.play().then(() => {
                video.pause();
                video.muted = false;
                sceneEl.systems["mindar-image-system"].start();
            }).catch(() => {
                sceneEl.systems["mindar-image-system"].start();
            });
        });

        const targetEntity = document.querySelector("#target");
        targetEntity.addEventListener("targetFound", () => video.play());
        targetEntity.addEventListener("targetLost", () => video.pause());
    </script>
</body>
</html>
