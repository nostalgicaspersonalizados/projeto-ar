<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nostálgicas - Experiência</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #ui { position: fixed; inset: 0; z-index: 1000; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; font-family: sans-serif; }
        .img-logo { max-width: 150px; margin-bottom: 20px; }
        button { padding: 15px 40px; font-size: 18px; background: #8C52FF; color: #fff; border: none; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #direitos-reservados { position: fixed; bottom: 10px; width: 100%; text-align: center; color: #fff; font-size: 10px; z-index: 999; opacity: 0.6; pointer-events: none; display: none; text-transform: uppercase; }
        /* Garante que o canvas da RA não fique atrás de nada */
        .a-canvas { z-index: 1; }
    </style>
</head>
<body>

    <div id="ui">
        <img src="./NOSTÁLGICAS.png" class="img-logo">
        <p>Aponte para a foto e veja a mágica!</p>
        <button id="startButton">INICIAR AGORA</button>
    </div>

    <div id="direitos-reservados">
        © 2026 Nostálgicas Personalizados
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid" src="./vidiobts.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.78" position="0 0 0" material="shader: flat; transparent: true; opacity: 1;"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const video = document.querySelector("#vid");
        const ui = document.querySelector("#ui");
        const sceneEl = document.querySelector("a-scene");

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            document.querySelector("#direitos-reservados").style.display = "block";
            
            // 1. Acorda o vídeo primeiro (essencial para iPhones)
            video.play().then(() => {
                video.pause();
                video.muted = false; // Tira o mudo para quando ele começar de fato
                
                // 2. Só depois inicia a câmera
                sceneEl.systems["mindar-image-system"].start();
            }).catch(e => {
                console.log("Erro ao despertar vídeo, tentando câmera direto.");
                sceneEl.systems["mindar-image-system"].start();
            });
        });

        const targetEntity = document.querySelector("#target");
        targetEntity.addEventListener("targetFound", () => {
            video.currentTime = 0; // Reinicia o vídeo para dar impacto
            video.play();
        });
        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
