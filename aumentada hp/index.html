<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nostálgicas - Experiência Mágica</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --cor-primaria: #8C52FF; }
        
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 🚫 ESCONDE O BOTÃO DE VR QUE ATRAPALHA O RODAPÉ */
        .a-enter-vr, .a-enter-ar, .a-orientation-modal { display: none !important; }

        /* CONFIGURAÇÃO DO FUNDO COM FOTO */
        #ui { 
            position: fixed; 
            inset: 0; 
            z-index: 1000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            color: #fff; 
            text-align: center; 
            padding: 20px;
            background: url('./fundo-tema.jpg') no-repeat center center;
            background-size: cover; 
        }

        /* Camada escura para dar leitura na foto */
        #ui::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.6); 
            z-index: -1;
        }

        .img-logo { 
            max-width: 150px; 
            margin-bottom: 25px; 
            filter: drop-shadow(0 0 10px rgba(140, 82, 255, 0.5)); 
        }

        .instrucoes { 
            background: rgba(255, 255, 255, 0.07); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 30px; 
            border: 1px solid rgba(140, 82, 255, 0.4);
            max-width: 280px;
            backdrop-filter: blur(8px);
        }

        .passo { font-size: 14px; margin: 15px 0; display: flex; align-items: center; text-align: left; }
        
        .numero { 
            background: var(--cor-primaria); 
            width: 24px; height: 24px; 
            border-radius: 50%; 
            margin-right: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            flex-shrink: 0;
            box-shadow: 0 0 8px var(--cor-primaria);
        }

        button { 
            padding: 16px 45px; 
            font-size: 18px; 
            background: var(--cor-primaria); 
            color: #fff; 
            border: none; 
            border-radius: 35px; 
            cursor: pointer; 
            font-weight: bold; 
            box-shadow: 0 0 20px rgba(140, 82, 255, 0.5);
        }

        /* Rodapé de Marketing */
        #footer-ar { 
            position: fixed; 
            bottom: 25px; /* Aumentei um pouquinho para não bater na borda da tela */
            width: 100%; 
            text-align: center; 
            z-index: 999; 
            display: none; 
            pointer-events: none; 
        }
        .mkt { font-size: 11px; font-weight: bold; color: var(--cor-primaria); margin-bottom: 6px; text-shadow: 0 0 8px #000; }
        .copy { font-size: 9px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1.5px; }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui">
        <img src="./NOSTÁLGICAS.png" class="img-logo">
        <div class="instrucoes">
            <div class="passo"><span class="numero">1</span> Clique no botão para começar</div>
            <div class="passo"><span class="numero">2</span> Permita o uso da câmera</div>
            <div class="passo"><span class="numero">3</span> Aponte para o quadro e veja a mágica!</div>
        </div>
        <button id="startButton">INICIAR AGORA</button>
    </div>

    <div id="footer-ar">
        <div class="mkt">🎥 Filmou a mágica? Marque @nostalgicas.personalizados</div>
        <div class="copy">© 2026 Nostálgicas Personalizados</div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes; filterMinCF:0.0001; filterBeta: 0.001;" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="vid" src="./hpss.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.78" position="0 0 0" material="shader: flat; transparent: true; opacity: 1;"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const video = document.querySelector("#vid");
        const ui = document.querySelector("#ui");
        const footer = document.querySelector("#footer-ar");
        const sceneEl = document.querySelector("a-scene");

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            footer.style.display = "block";
            
            video.play().then(() => {
                video.pause();
                video.muted = false; 
                sceneEl.systems["mindar-image-system"].start();
            }).catch(e => {
                sceneEl.systems["mindar-image-system"].start();
            });
        });

        const targetEntity = document.querySelector("#target");
        targetEntity.addEventListener("targetFound", () => {
            video.currentTime = 0; 
            video.play();
        });
        targetEntity.addEventListener("targetLost", () => {
            video.pause();
        });
    </script>
</body>
</html>
