<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Botão para iniciar a experiência e permitir o som */
      #ui {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.8); z-index: 1000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white; font-family: sans-serif;
      }
      button {
        padding: 15px 30px; font-size: 18px; cursor: pointer;
        background: #9b59b6; border: none; color: white; border-radius: 5px;
      }
    </style>
  </head>
  <body>

    <div id="ui">
      <p>Pronto para ver a mágica?</p>
      <button id="startButton">CLIQUE PARA INICIAR</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="vid" src="./hp.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#vid" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startButton = document.querySelector("#startButton");
      const ui = document.querySelector("#ui");
      const sceneEl = document.querySelector("a-scene");
      const video = document.querySelector("#vid");
      const targetEntity = document.querySelector("#target");

      // Inicia a cena e o vídeo (mudo) após o clique
      startButton.addEventListener('click', () => {
        ui.style.display = "none";
        sceneEl.systems["mindar-image-system"].start();
        video.play(); // Play inicial para "acordar" o vídeo
        video.pause();
      });

      // Toca o vídeo quando a imagem é reconhecida
      targetEntity.addEventListener("targetFound", () => {
        video.play();
      });

      // Pausa quando a câmera perde a imagem
      targetEntity.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
