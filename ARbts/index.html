<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nostálgicas - Experiência Mágica</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root {
            --cor-primaria: #8C52FF; 
            --cor-fundo: #000000;
        }

        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; color: white; }
        
        #ui { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            z-index: 1000; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; padding: 20px; text-align: center;
        }

        .img-logo { max-width: 150px; height: auto; margin-bottom: 25px; }

        .instrucoes { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 30px; border: 1px solid rgba(140, 82, 255, 0.3); }
        .passo { font-size: 14px; margin: 10px 0; display: flex; align-items: center; text-align: left; }
        .numero { background: var(--cor-primaria); padding: 5px 10px; border-radius: 50%; margin-right: 10px; font-weight: bold; }

        button { 
            padding: 15px 35px; font-size: 16px; font-weight: bold; 
            background: var(--cor-primaria); border: none; color: white; 
            border-radius: 30px; cursor: pointer; animation: pulsar 2s infinite;
        }
        
        @keyframes pulsar {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px var(--cor-primaria); }
            100% { transform: scale(1); }
        }

        #direitos-reservados {
            position: fixed; bottom: 15px; width: 100%; text-align: center; 
            color: white; font-size: 10px; z-index: 9999; opacity: 0.7; 
            pointer-events: none; text-transform: uppercase; letter-spacing: 1px;
        }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="ui">
        <img src="./NOSTÁLGICAS.png" class="img-logo" alt="Nostálgicas Personalizados">
        
        <div class="instrucoes">
            <div class="passo"><span class="numero">1</span> Clique no botão abaixo</div>
            <div class="passo"><span class="numero">2</span> Permita o uso da câmera</div>
            <div class="passo"><span class="numero">3</span> Aponte para o objeto e veja a mágica!</div>
        </div>

        <button id="startButton">INICIAR EXPERIÊNCIA</button>
    </div>

    <div id="direitos-reservados" style="display: none;">
        © 2026 Nostálgicas Personalizados - Todos os direitos reservados
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes; filterMinCF:0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
          <video id="vid" src="./vidiobts.mp4" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.78" position="0 0 0" rotation="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const ui = document.querySelector("#ui");
        const sceneEl = document.querySelector("a-scene");
        const video = document.querySelector("#vid");
        const direitos = document.querySelector("#direitos-reservados");

       startButton.addEventListener('click', () => {
    ui.style.display = "none";
    direitos.style.display = "block";
    
    // Inicia a câmera
    sceneEl.systems["mindar-image-system"].start();

    // DESPERTA O VÍDEO (Crucial para não ficar preto)
    video.play().then(() => {
        video.pause(); // Dá o play e pause em milissegundos para o navegador "aceitar" o vídeo
        video.muted = false; // Tira o mudo para o cliente ouvir quando o vídeo começar de verdade
    }).catch(e => console.log("Erro ao despertar vídeo:", e));
});
