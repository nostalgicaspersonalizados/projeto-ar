<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Nostálgicas - Experiência Mágica</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        :root { --cor-primaria: #8C52FF; --cor-fundo: #000000; }
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #000; color: white; }
        #ui { position: fixed; inset: 0; background: #000; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .img-logo { max-width: 150px; height: auto; margin-bottom: 25px; }
        .instrucoes { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 30px; border: 1px solid #8C52FF; }
        button { padding: 15px 35px; font-size: 16px; font-weight: bold; background: var(--cor-primaria); border: none; color: white; border-radius: 30px; cursor: pointer; }
        #direitos-reservados { position: fixed; bottom: 15px; width: 100%; text-align: center; color: white; font-size: 10px; z-index: 9999; opacity: 0.7; display: none; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <img src="./NOSTÁLGICAS.png" class="img-logo">
        <div class="instrucoes">
            <p>1. Clique no botão abaixo</p>
            <p>2. Permita a câmera</p>
            <p>3. Aponte para a foto</p>
        </div>
        <button id="startButton">INICIAR EXPERIÊNCIA</button>
    </div>

    <div id="direitos-reservados">
        © 2026 Nostálgicas Personalizados - Todos os direitos reservados
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: yes;" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
        <a-assets>
            <video id="vid" src="./vidiobts.mp4?v=1" preload="auto" loop="true" crossorigin="anonymous" playsinline webkit-playsinline muted></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#vid" width="1" height="1.78" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startButton = document.querySelector("#startButton");
        const video = document.querySelector("#vid");
        const ui = document.querySelector("#ui");

        startButton.addEventListener('click', () => {
            ui.style.display = "none";
            document.querySelector("#direitos-reservados").style.display = "block";
            
            // Comando para "acordar" o vídeo e a câmera
            const sceneEl = document.querySelector("a-scene");
            sceneEl.systems["mindar-image-system"].start();

            video.play().then(() => {
                video.pause();
                video.muted = false;
            }).catch(e => console.error("Erro ao iniciar:", e));
        });

        const targetEntity = document.querySelector("#target");
        targetEntity.addEventListener("targetFound", () => {
            console.log("Alvo encontrado!");
            video.play();
        });
        targetEntity.addEventListener("targetLost", () => {
            console.log("Alvo perdido!");
            video.pause();
        });
    </script>
</body>
</html>
